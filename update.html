<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenith Fitness | Member Update</title>
  <link rel="stylesheet" href="renewal.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a class="nav-brand" href="index.html" aria-label="Zenith Fitness home">
    <img src="assets/zenith-logo.png" alt="Zenith Fitness logo">
    <span>Zenith Fitness</span>
  </a>
  <div class="nav-links">
    <a href="index.html">New Admission</a>
    <a href="renewal.html">Renewal</a>
    <a href="update.html" class="active">Member Update</a>
    <a href="enquire.html">Enquire</a>
  </div>
</nav>

<div class="container">
  <h1>Member Update</h1>

  <div class="section">
    <h2>Find Member</h2>
    <div class="row">
      <input type="text" id="searchMember" placeholder="Enter Mobile Number or Admission ID">
      <button type="button" id="searchBtn">Search</button>
    </div>
  </div>

  <div class="section">
    <h2>Current Details</h2>
    <div class="row">
      <input type="text" id="memberName" placeholder="Name" readonly disabled>
      <input type="text" id="memberId" placeholder="Admission ID" readonly disabled>
    </div>
    <div class="row">
      <input type="text" id="currentPlan" placeholder="Current Plan" readonly disabled>
      <input type="text" id="currentStartDate" placeholder="Current Start Date" readonly disabled>
      <input type="text" id="currentEndDate" placeholder="Current End Date" readonly disabled>
    </div>
    <div class="row">
      <input type="text" id="currentPaymentStatus" placeholder="Payment Status" readonly disabled>
      <input type="number" id="currentPendingAmount" placeholder="Pending Amount" readonly disabled>
    </div>
  </div>

  <form id="paymentForm">
    <input type="hidden" id="hiddenAdmissionId">
    <input type="hidden" id="hiddenMobile">

    <div class="section">
      <h2>Collect Pending Payment</h2>
      <div class="row">
        <input type="number" id="amountPaid" placeholder="Amount Received" required disabled>
        <select id="paymentMode" required disabled>
          <option value="">Payment Mode</option>
          <option>Cash</option>
          <option>UPI</option>
          <option>Card</option>
        </select>
      </div>
      <div class="row">
        <input type="text" id="paymentNote" placeholder="Payment note optional" disabled>
      </div>
      <button type="submit" id="savePaymentBtn" disabled>Save Payment Update</button>
    </div>
  </form>

  <form id="packageForm">
    <div class="section">
      <h2>Change Package / End Date</h2>
      <div class="row">
        <select id="newPlan" required disabled>
          <option value="">Select Package</option>
          <option value="30">1 Month</option>
          <option value="90">3 Months</option>
          <option value="180">6 Months</option>
          <option value="365">12 Months</option>
          <option value="custom">Custom End Date</option>
        </select>
        <input type="date" id="newStartDate" required disabled>
      </div>
      <div class="row">
        <input type="date" id="newEndDate" required disabled>
        <input type="text" id="packageNote" placeholder="Reason / note" disabled>
      </div>
      <button type="submit" id="savePackageBtn" disabled>Save Package Update</button>
    </div>
  </form>
</div>

<script src="update.js"></script>
</body>
</html>
