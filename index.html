<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zenith Fitness | Admission Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand">🏋️ Zenith Fitness</div>
    <div class="nav-links">
      <a href="index.html" class="active">New Admission</a>
      <a href="renewal.html">Renewal</a>
      <a href="enquire.html">Enquire</a>
    </div>
  </nav>

  <h1>🏋️ Zenith Fitness Admission Form</h1>

  <form id="admissionForm">

    <!-- PERSONAL DETAILS -->
    <div class="section">
  <h2>Personal Details</h2>

  <div class="row">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="tel" id="mobile" placeholder="Mobile Number" required>
  </div>

  <div class="row">
    <select id="gender" required>
      <option value="">Select Gender</option>
      <option>Male</option>
      <option>Female</option>
      <option>Other</option>
    </select>

    <input type="number" id="age" placeholder="Age">
  </div>

  <div class="row">
    <input type="text" id="birthDate" placeholder="BirthDate" inputmode="numeric">
    <input type="text" id="address" placeholder="Address">
  </div>

  <div class="row">
    <textarea id="injuries" placeholder="Any prior injuries / medical history"></textarea>
  </div>
</div>


    <!-- MEMBERSHIP DETAILS -->
    <div class="section">
      <h2>Membership Details</h2>

      <div class="row">
        <select id="plan" required onchange="calculateEndDate()">
  <option value="">Select Plan</option>
  <option value="30">1 Month</option>
  <option value="90">3 Months</option>
  <option value="180">6 Months</option>
  <option value="365">12 Months</option>
  <option value="custom">Customize Package</option>
</select>

        <select id="category" required>
          <option value="">Membership Type</option>
          <option>Regular</option>
          <option>Happy Hours</option>
          <option>Zumba</option>
        </select>
      </div>

      <div class="row">
        <input type="date" id="startDate" required onchange="calculateEndDate()">
        <input type="date" id="endDate">
      </div>
    </div>

    <!-- PAYMENT DETAILS -->
    <div class="section">
      <h2>Payment Details</h2>

      <div class="row">
        <input type="number" id="totalAmount" placeholder="Total Amount" required oninput="calculateFinalAmount()">
        <input type="number" id="discount" placeholder="Discount" required oninput="calculateFinalAmount()">
      </div>

      <div class="row">
        <input type="number" id="finalAmount" placeholder="Final Amount" readonly>

        <select id="paymentMode" required>
          <option value="">Payment Mode</option>
          <option>Cash</option>
          <option>UPI</option>
          <option>Card</option>
        </select>
      </div>

      <div class="row">
        <select id="paymentStatus" required>
          <option value="">Payment Status</option>
          <option>Paid</option>
          <option>Partial</option>
          <option>Pending</option>
        </select>
      </div>
    </div>

    <!-- REMARKS -->
    <div class="section">
      <h2>Remarks</h2>
      <textarea id="remarks" placeholder="Any notes..."></textarea>
    </div>

    <button type="submit" id="submitAdmissionBtn">Submit Admission</button>

  </form>
</div>

<script src="script.js"></script>
</body>
</html>
