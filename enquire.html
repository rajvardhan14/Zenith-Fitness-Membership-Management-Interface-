<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zenith Fitness | Enquiry</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand">&#127947;&#65039; Zenith Fitness</div>
    <div class="nav-links">
      <a href="index.html">New Admission</a>
      <a href="renewal.html">Renewal</a>
      <a href="enquire.html" class="active">Enquire</a>
    </div>
  </nav>

  <h1>&#128221; Enquiry Form</h1>

  <form id="enquiryForm">

    <div class="section">
      <h2>Contact Details</h2>
      <div class="row">
        <input type="text" id="enqName" placeholder="Name" required>
        <input type="tel" id="enqContact" placeholder="Contact No" required>
      </div>
      <div class="row">
        <input type="text" id="enqEmail" placeholder="Address (optional)">
        <select id="enqInterestedIn">
          <option value="">Interested In (optional)</option>
          <option value="Gym">Gym</option>
          <option value="Zumba">Zumba</option>
          <option value="Personal Training">Personal Training</option>
          <option value="Happy Hours">Happy Hours</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>

    <div class="section">
      <h2>Enquiry</h2>
      <div class="row">
        <select id="enqSource">
          <option value="">How did you hear about us? (optional)</option>
          <option value="Walk-in">Walk-in</option>
          <option value="Referral">Referral</option>
          <option value="Instagram">Instagram</option>
          <option value="Google">Google</option>
          <option value="Other">Other</option>
        </select>
        <input type="date" id="enqFollowUpDate" placeholder="Follow-up date (optional)">
      </div>
      <div class="row">
        <textarea id="enqMessage" placeholder="Message / Requirements (optional)"></textarea>
      </div>
    </div>

    <button type="submit" id="submitEnquiryBtn">Submit Enquiry</button>
  </form>
</div>

<script src="enquire.js"></script>
</body>
</html>
